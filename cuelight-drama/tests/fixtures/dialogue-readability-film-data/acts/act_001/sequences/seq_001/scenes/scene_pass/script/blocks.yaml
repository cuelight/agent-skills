- block_id: blk_pass_001
  scene_id: scene_pass
  order_index: 1
  block_type: scene_heading
  text: 内景. 档案室 - 夜
- block_id: blk_pass_002
  scene_id: scene_pass
  order_index: 2
  block_type: action
  text: 雨水顺着百叶窗缝落在地砖上，档案柜一排排沉在冷光里。林澈把一只旧录音机放到桌角，磁带转轴轻轻抖动，像有人在墙后屏住呼吸。顾岚站在门口，没有立刻进来，她先看见桌上那枚被擦亮的钥匙，又看见林澈袖口上的灰，知道他已经在这里等了很久。走廊尽头的灯闪了一下，两个人之间的距离被那一下暗光重新量过。
- block_id: blk_pass_003
  scene_id: scene_pass
  order_index: 3
  block_type: dialogue
  character_id: char_lin
  text: 你把门关上，是怕外面听见，还是怕我听完就走？
- block_id: blk_pass_004
  scene_id: scene_pass
  order_index: 4
  block_type: action
  text: 顾岚把门推到只剩一条缝。门锁没有扣死，走廊的雨声仍从缝里压进来。她没有碰钥匙，只把湿伞靠在墙边，伞尖滴出的水在地面连成短短一线。
- block_id: blk_pass_005
  scene_id: scene_pass
  order_index: 5
  block_type: dialogue
  character_id: char_gu
  text: 我怕你把真相说得太像请求。
- block_id: blk_pass_006
  scene_id: scene_pass
  order_index: 6
  block_type: action
  text: 录音机里传出一声空白的磁带噪音。林澈伸向停止键的手停在半空，顾岚这才走近一步，影子越过桌角，压住那枚钥匙。窗外的雨忽然大起来，档案柜上的标签被风吹得轻轻翻动，露出一行被划掉的旧名字。
