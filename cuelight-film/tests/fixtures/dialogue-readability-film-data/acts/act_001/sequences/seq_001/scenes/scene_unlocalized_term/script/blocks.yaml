- block_id: blk_term_001
  scene_id: scene_unlocalized_term
  order_index: 1
  block_type: scene_heading
  text: 内景. 旧电影院放映室 - 夜
- block_id: blk_term_002
  scene_id: scene_unlocalized_term
  order_index: 2
  block_type: action
  text: 放映机没有开，银幕后的齿轮却自己转了半圈。SOUND：胶片盒里传出细小的刮擦声。叶青把手电压低，光束扫过地上一圈圈散开的胶片，画面里反复出现同一扇门。沈牧站在机柜旁，手指贴着电源开关，却没有按下去；他看见胶片边缘有新鲜的指纹，知道有人刚离开不久。
- block_id: blk_term_003
  scene_id: scene_unlocalized_term
  order_index: 3
  block_type: dialogue
  character_id: char_ye
  text: 如果它自己在放映，就说明有人不想让我们看第一格。
- block_id: blk_term_004
  scene_id: scene_unlocalized_term
  order_index: 4
  block_type: action
  text: 沈牧把电源线从墙上拔下。齿轮没有停，反而转得更慢，像一只正在咬住时间的牙。银幕背面透出一格暗红的光，门外的楼梯间跟着亮了一下。
- block_id: blk_term_005
  scene_id: scene_unlocalized_term
  order_index: 5
  block_type: dialogue
  character_id: char_shen
  text: 那就别看第一格，直接看它藏起来的下一格。
- block_id: blk_term_006
  scene_id: scene_unlocalized_term
  order_index: 6
  block_type: action
  text: 叶青把手电关掉。放映室暗下来，胶片上的门却在黑里慢慢成形。两个人同时听见楼下座椅被掀起的声音，像有观众在空厅里站起来，准备替他们按下播放键。沈牧把那段胶片绕过自己的手腕，胶片边缘勒出一道浅印，他没有松手。
